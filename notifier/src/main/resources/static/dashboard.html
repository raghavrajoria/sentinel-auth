<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sentinel-Auth Live Alerts</title>
    <style>
        body {
            font-family: monospace;
            background: #0a0a0a;
            color: #00ff41;
            padding: 20px;
        }
        h1 { color: #ff0040; }
        #status { color: #888; margin-bottom: 20px; }
        #stats {
            display: flex;
            gap: 40px;
            margin-bottom: 20px;
        }
        .stat {
            background: #111;
            padding: 15px 25px;
            border: 1px solid #333;
        }
        .stat-value {
            font-size: 2em;
            color: #ff0040;
        }
        .stat-label { color: #888; font-size: 0.8em; }
        #alerts { max-height: 600px; overflow-y: auto; }
        .alert-card {
            background: #111;
            border-left: 4px solid #ff0040;
            padding: 12px 16px;
            margin-bottom: 8px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-10px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        .tx-id { color: #fff; font-weight: bold; }
        .risk  { color: #ff0040; }
        .rules { color: #888; font-size: 0.85em; }
        .time  { color: #555; font-size: 0.8em; float: right; }
    </style>
</head>
<body>
<h1>🚨 Sentinel-Auth Live Fraud Alerts</h1>
<div id="status">Connecting...</div>

<div id="stats">
    <div class="stat">
        <div class="stat-value" id="block-count">0</div>
        <div class="stat-label">BLOCKS TODAY</div>
    </div>
    <div class="stat">
        <div class="stat-value" id="avg-risk">0</div>
        <div class="stat-label">AVG RISK SCORE</div>
    </div>
</div>

<div id="alerts"></div>

<script>
    let blockCount = 0;
    let totalRisk = 0;

    const ws = new WebSocket('ws://localhost:8082/ws/alerts');

    ws.onopen = () => {
        document.getElementById('status').textContent
            = '● Connected — listening for BLOCK alerts';
        document.getElementById('status').style.color = '#00ff41';
    };

    ws.onclose = () => {
        document.getElementById('status').textContent
            = '● Disconnected';
        document.getElementById('status').style.color = '#ff0040';
    };

    ws.onmessage = (event) => {
        const alert = JSON.parse(event.data);

        blockCount++;
        totalRisk += alert.risk_score;

        document.getElementById('block-count').textContent = blockCount;
        document.getElementById('avg-risk').textContent
            = Math.round(totalRisk / blockCount);

        const rules = Array.isArray(alert.rules_fired)
            ? alert.rules_fired.join(', ')
            : JSON.stringify(alert.rules_fired);

        const time = new Date(alert.timestamp)
            .toLocaleTimeString();

        const card = document.createElement('div');
        card.className = 'alert-card';
        card.innerHTML = `
            <span class="time">${time}</span>
            <div class="tx-id">🚫 ${alert.tx_id}</div>
            <div class="risk">Risk Score: ${alert.risk_score}</div>
            <div>User: ${alert.user_id}</div>
            <div class="rules">Rules: ${rules}</div>
        `;

        const alertsDiv = document.getElementById('alerts');
        alertsDiv.insertBefore(card, alertsDiv.firstChild);
    };
</script>
</body>
</html>
