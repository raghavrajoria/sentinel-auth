syntax = "proto3";

package sentinel;

service ScoringService {
  rpc Score (ScoreRequest) returns (ScoreResponse);
}

message ScoreRequest {
  string tx_id = 1;
  string user_id = 2;
  double amount = 3;
  int32 history_count = 4;
  string device_fingerprint = 5;
}

message ScoreResponse {
  string tx_id = 1;
  int32 risk_score = 2;
  bool ml_used = 3;
}